<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dito Creative</title>

    <!-- favico -->
    <link rel="shortcut icon" href="../media/favicon.ico" type="image/x-icon">
    <link rel="icon" href="../media/favicon.ico" type="image/x-icon">

    <!-- kit de iconos -->
    <script src="https://kit.fontawesome.com/62afea99ed.js" crossorigin="anonymous"></script>

    <!-- JQUERY -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>

    <script src="app.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/nanogallery2@3/dist/css/nanogallery2.min.css" rel="stylesheet"
        type="text/css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/nanogallery2@3/dist/jquery.nanogallery2.min.js">
    </script>


    <!-- LESS -->
    <link rel="stylesheet/less" href="style.less">
    <script src="less.min.js" type="text/javascript"></script>
</head>

<body>
    <div class="main">
        <header class="header">
            <div class="animation-header">
                <div class="lft">[</div>
                Dito Creative
                <div class="rght">]</div>
            </div>

            <button id="boton-user">
                <i class="fas fa-user"></i>


            </button>
            <div class="none">
                <h2>Login</h2>
                <form>
                    <div>
                        <i class="far fa-user"></i>
                        <input type="text" placeholder="Nombre">
                    </div>
                    <div>
                        <i class="fas fa-lock"></i>
                        <input type="password">
                    </div>
                    <input type="submit" value="Inicio">
                    <input type="submit" id="botCerrar" value="Cerrar">
                </form>
            </div>
            <button id="boton-night">
                <i class="fas fa-adjust"></i>
            </button>
        </header>
    </div>

    <footer class="contacto">
        <div>Telefono: 646462244</div>
        <div>Dirección: C/ Melodía 23, Madrid</div>
        <div>Diseño: Miguel Ángel Morcillo</div>
    </footer>
    <div id="my_nanogallery2">
    </div>
    <div class="payment">
        <div id="smart-button-container">
            <div style="text-align: center;">
                <div id="paypal-button-container"></div>
            </div>
        </div>
        <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"
            data-sdk-integration-source="button-factory"></script>
        <script>
            function initPayPalButton() {
                paypal.Buttons({
                    style: {
                        shape: 'rect',
                        color: 'silver',
                        layout: 'vertical',
                        label: 'pay',

                    },

                    createOrder: function (data, actions) {
                        return actions.order.create({
                            purchase_units: [{
                                "description": "Lamina a color 250gr",
                                "amount": {
                                    "currency_code": "EUR",
                                    "value": 18,
                                    "breakdown": {
                                        "item_total": {
                                            "currency_code": "EUR",
                                            "value": 15
                                        },
                                        "shipping": {
                                            "currency_code": "EUR",
                                            "value": 3
                                        },
                                        "tax_total": {
                                            "currency_code": "EUR",
                                            "value": 0
                                        }
                                    }
                                }
                            }]
                        });
                    },

                    onApprove: function (data, actions) {
                        return actions.order.capture().then(function (details) {
                            alert('Transaction completed by ' + details.payer.name.given_name +
                                '!');
                        });
                    },

                    onError: function (err) {
                        console.log(err);
                    }
                }).render('#paypal-button-container');
            }
            initPayPalButton();
        </script>
    </div>
</body>

</html>
